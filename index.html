<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APRIMORE - CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d12;--surface:#111520;--surface2:#161c2b;--surface3:#1c2336;
  --border:#ffffff0f;--border2:#ffffff18;
  --text:#f0f2f7;--text2:#8a92a8;--text3:#4a5068;
  --accent:#00e5a0;--accent2:#00b87d;--accent-glow:#00e5a020;
  --blue:#3d8ef8;--blue-light:#1a3a6e;
  --orange:#ff7b35;--orange-light:#3d2010;
  --red:#ff4757;--red-light:#3d1018;
  --yellow:#ffcc00;--yellow-light:#3d3000;
  --purple:#a855f7;--purple-light:#2d1a4a;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --r:10px;--r2:14px;--r3:20px;
  --shadow:0 4px 24px #00000040;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px}

/* SIDEBAR */
.logo{padding:20px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-txt{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--text)}
.logo-txt span{color:var(--accent)}
.nav{padding:12px 10px;flex:1}
.nav-group{margin-bottom:20px}
.nav-group-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;position:relative;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);font-weight:500}
.nav-item .badge{margin-left:auto;background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.nav-item .badge.red{background:var(--red)}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.sync-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-size:12px;color:var(--text2)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* TOPBAR */
.topbar-left{display:flex;align-items:center;gap:14px}
.page-title{font-family:var(--font-head);font-size:16px;font-weight:600}
.search-wrap{position:relative}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px 8px 34px;font-size:13px;color:var(--text);width:220px;font-family:var(--font-body);transition:border .2s}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font-body);transition:all .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid var(--red)30}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.07;transform:translate(20px,-20px)}
.stat-card.green::before{background:var(--accent)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.orange::before{background:var(--orange)}
.stat-card.purple::before{background:var(--purple)}
.stat-card.red::before{background:var(--red)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-val{font-family:var(--font-head);font-size:26px;font-weight:700;line-height:1}
.stat-val.green{color:var(--accent)}
.stat-val.blue{color:var(--blue)}
.stat-val.orange{color:var(--orange)}
.stat-val.purple{color:var(--purple)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* SECTION */
.section{display:none}
.section.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:var(--font-head);font-size:14px;font-weight:600}

/* LEADS GRID */
.leads-controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);padding:4px;border-radius:var(--r)}
.filter-tab{padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:var(--font-body);transition:all .15s}
.filter-tab.active{background:var(--surface2);color:var(--text);font-weight:500}
.select-filter{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--text2);font-family:var(--font-body);cursor:pointer}
.select-filter:focus{outline:none}

.leads-table{width:100%;border-collapse:collapse}
.leads-table th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.leads-table td{padding:10px 12px;border-bottom:1px solid var(--border)08;vertical-align:middle}
.leads-table tr:hover td{background:var(--surface2)}
.leads-table tr:last-child td{border-bottom:none}

.avatar-sm{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.lead-name-wrap{display:flex;align-items:center;gap:10px}
.lead-name{font-size:13px;font-weight:500;color:var(--text)}
.lead-company{font-size:11px;color:var(--text3);margin-top:1px}

.temp-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.temp-quente{background:#ff4757 18;color:#ff6b7a;border:1px solid #ff475730}
.temp-morno{background:#ff7b3518;color:#ff9a5c;border:1px solid #ff7b3530}
.temp-frio{background:#3d8ef818;color:#6aaffe;border:1px solid #3d8ef830}

.stage-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.stage-lead{background:#3d8ef818;color:#6aaffe}
.stage-qualificado{background:#a855f718;color:#c084fc}
.stage-proposta{background:#ff7b3518;color:#ff9a5c}
.stage-negociacao{background:#ffcc0018;color:#ffd740}
.stage-fechado{background:#00e5a018;color:#00e5a0}
.stage-perdido{background:#ff475718;color:#ff6b7a}

.score-bar{width:60px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width .3s}

.action-btns{display:flex;gap:6px}
.icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:var(--surface2);color:var(--text)}

/* PIPELINE */
.pipeline-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;min-height:500px}
.pipe-col{min-width:210px;flex-shrink:0}
.pipe-col-header{padding:10px 12px;border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pipe-col-title{font-size:12px;font-weight:600}
.pipe-col-count{font-size:11px;padding:2px 8px;border-radius:10px;opacity:.7}
.pipe-col-total{font-size:11px;margin-top:2px;opacity:.6}

.pipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative}
.pipe-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.pipe-card-title{font-size:13px;font-weight:500;margin-bottom:4px}
.pipe-card-company{font-size:11px;color:var(--text3);margin-bottom:8px}
.pipe-card-value{font-size:14px;font-weight:700;color:var(--accent)}
.pipe-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.pipe-card-days{font-size:10px;color:var(--text3)}
.pipe-card-prob{font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px}

.nba-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-glow);border:1px solid var(--accent)30;color:var(--accent);font-size:10px;padding:3px 8px;border-radius:6px;margin-top:8px}

/* ATIVIDADES */
.activities-feed{display:flex;flex-direction:column;gap:8px}
.act-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.act-icon-wrap{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.act-body{flex:1}
.act-title{font-size:13px;font-weight:500;margin-bottom:2px}
.act-meta{font-size:12px;color:var(--text2)}
.act-time{font-size:11px;color:var(--text3);white-space:nowrap}

/* ALERTAS */
.alerts-list{display:flex;flex-direction:column;gap:8px}
.alert-item{border:1px solid;border-radius:var(--r2);padding:14px 16px;display:flex;gap:12px;align-items:center}
.alert-hot{background:var(--red-light);border-color:#ff475730}
.alert-warm{background:var(--orange-light);border-color:#ff7b3530}
.alert-info{background:var(--blue-light);border-color:#3d8ef830}
.alert-icon{font-size:18px}
.alert-body{flex:1}
.alert-title{font-size:13px;font-weight:500;margin-bottom:2px}
.alert-sub{font-size:12px;color:var(--text2)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:#00000080;backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:28px;width:480px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--font-head);font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--text);font-family:var(--font-body);transition:border .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px}
.form-select option{background:var(--surface)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* RELATÓRIOS */
.reports-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.funnel-bar{display:flex;flex-direction:column;gap:8px}
.funnel-row{display:flex;align-items:center;gap:10px}
.funnel-label{font-size:12px;color:var(--text2);width:100px;flex-shrink:0}
.funnel-track{flex:1;background:var(--surface2);border-radius:4px;height:22px;overflow:hidden}
.funnel-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:600;transition:width .5s;color:#000}
.funnel-num{font-size:12px;color:var(--text2);width:40px;text-align:right;flex-shrink:0}

.perf-table{width:100%;border-collapse:collapse}
.perf-table td{padding:9px 10px;border-bottom:1px solid var(--border)}
.perf-table tr:last-child td{border-bottom:none}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:0;height:100vh;width:380px;background:var(--surface);border-left:1px solid var(--border2);z-index:500;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;overflow:hidden}
.detail-panel.open{transform:translateX(0)}
.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.detail-body{padding:20px;overflow-y:auto;flex:1}
.detail-section{margin-bottom:20px}
.detail-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px}
.detail-field{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)60;font-size:13px}
.detail-field:last-child{border-bottom:none}
.detail-key{color:var(--text2)}
.detail-val{font-weight:500;text-align:right;max-width:55%}
.timeline{display:flex;flex-direction:column;gap:10px}
.timeline-item{display:flex;gap:10px;align-items:flex-start}
.timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.timeline-content{font-size:12px}
.timeline-title{font-weight:500;color:var(--text);margin-bottom:1px}
.timeline-time{color:var(--text3)}
.nba-box{background:var(--accent-glow);border:1px solid var(--accent)30;border-radius:var(--r);padding:12px;margin-bottom:12px}
.nba-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:4px}
.nba-text{font-size:13px;font-weight:500}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.5}
.empty-title{font-family:var(--font-head);font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:56px}.logo-txt,.nav-group-label,.nav-item span{display:none}
  .nav-item{justify-content:center}.nav-icon{margin:0}
  .reports-grid{grid-template-columns:1fr}
  .detail-panel{width:100%}
}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 18px;font-size:13px;color:var(--text);z-index:2000;transform:translateY(80px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--accent)50}.toast-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-txt">APRIMORE<span> CRM</span></div>
    </div>
    <nav class="nav">
      <div class="nav-group">
        <div class="nav-group-label">Principal</div>
        <button class="nav-item active" onclick="goTo('dashboard',this)"><span class="nav-icon">📊</span><span>Dashboard</span></button>
        <button class="nav-item" onclick="goTo('leads',this)"><span class="nav-icon">👥</span><span>Leads</span><span class="badge" id="nav-leads-badge">0</span></button>
        <button class="nav-item" onclick="goTo('pipeline',this)"><span class="nav-icon">🏆</span><span>Pipeline</span></button>
        <button class="nav-item" onclick="goTo('atividades',this)"><span class="nav-icon">📋</span><span>Atividades</span></button>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">Inteligência</div>
        <button class="nav-item" onclick="goTo('alertas',this)"><span class="nav-icon">🔔</span><span>Alertas</span><span class="badge red" id="nav-alerts-badge">0</span></button>
        <button class="nav-item" onclick="goTo('relatorios',this)"><span class="nav-icon">📈</span><span>Relatórios</span></button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sync-pill"><div class="sync-dot"></div><span id="sync-txt">Online · compartilhado</span></div>
    </div>
  </aside>

  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" placeholder="Buscar lead, empresa..." oninput="globalSearch(this.value)" id="global-search"/>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" onclick="openModal('activity')">+ Atividade</button>
        <button class="btn btn-primary" onclick="openModal('lead')">+ Novo Lead</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- DASHBOARD -->
      <div id="sec-dashboard" class="section active">
        <div class="stats-grid" id="stats-grid"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
          <div class="card">
            <div class="card-header"><div class="card-title">🔥 Leads quentes agora</div></div>
            <div id="dash-hot-leads"></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">⚡ Próximas ações (NBA)</div></div>
            <div id="dash-nba"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">📅 Atividades recentes</div></div>
          <div id="dash-activities"></div>
        </div>
      </div>

      <!-- LEADS -->
      <div id="sec-leads" class="section">
        <div class="leads-controls">
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterLeads('all',this)">Todos</button>
            <button class="filter-tab" onclick="filterLeads('quente',this)">🔥 Quentes</button>
            <button class="filter-tab" onclick="filterLeads('morno',this)">🟡 Mornos</button>
            <button class="filter-tab" onclick="filterLeads('frio',this)">❄️ Frios</button>
          </div>
          <select class="select-filter" onchange="filterByStage(this.value)">
            <option value="">Todos os estágios</option>
            <option value="lead">Lead</option>
            <option value="qualificado">Qualificado</option>
            <option value="proposta">Proposta</option>
            <option value="negociacao">Negociação</option>
            <option value="fechado">Fechado</option>
            <option value="perdido">Perdido</option>
          </select>
          <select class="select-filter" onchange="filterByOrigin(this.value)">
            <option value="">Todas origens</option>
            <option value="indicacao">Indicação</option>
            <option value="instagram">Instagram</option>
            <option value="google">Google</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="email">E-mail</option>
            <option value="evento">Evento</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div id="leads-table-wrap"></div>
        </div>
      </div>

      <!-- PIPELINE -->
      <div id="sec-pipeline" class="section">
        <div class="pipeline-board" id="pipeline-board"></div>
      </div>

      <!-- ATIVIDADES -->
      <div id="sec-atividades" class="section">
        <div class="activities-feed" id="activities-full"></div>
      </div>

      <!-- ALERTAS -->
      <div id="sec-alertas" class="section">
        <div class="alerts-list" id="alerts-list"></div>
      </div>

      <!-- RELATÓRIOS -->
      <div id="sec-relatorios" class="section">
        <!-- Abas de período -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px">
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="setReportPeriod('diario',this)">📅 Diário</button>
            <button class="filter-tab" onclick="setReportPeriod('semanal',this)">📆 Semanal</button>
            <button class="filter-tab" onclick="setReportPeriod('mensal',this)">🗓️ Mensal</button>
            <button class="filter-tab" onclick="setReportPeriod('geral',this)">📊 Geral</button>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" onclick="downloadCSV()">⬇️ Excel / CSV</button>
            <button class="btn btn-primary btn-sm" onclick="downloadPDF()">⬇️ PDF</button>
          </div>
        </div>
        <div id="report-period-label" style="font-size:12px;color:var(--text3);margin-bottom:16px"></div>
        <!-- Stats do período -->
        <div id="report-stats" class="stats-grid" style="margin-bottom:18px"></div>
        <div class="reports-grid">
          <div class="card">
            <div class="card-header"><div class="card-title">📊 Funil de conversão</div></div>
            <div class="funnel-bar" id="funnel-chart"></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">💰 Métricas financeiras</div></div>
            <div id="financial-metrics"></div>
          </div>
          <div class="card" style="grid-column:1/-1">
            <div class="card-header"><div class="card-title">📅 Distribuição por origem</div></div>
            <div id="origin-chart" style="display:flex;gap:12px;flex-wrap:wrap"></div>
          </div>
          <div class="card" style="grid-column:1/-1">
            <div class="card-header"><div class="card-title">📋 Leads do período</div></div>
            <div id="report-leads-table"></div>
          </div>
          <div class="card" style="grid-column:1/-1">
            <div class="card-header"><div class="card-title">🗒️ Atividades do período</div></div>
            <div id="report-activities-table"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700" id="detail-name">—</div>
    <button class="icon-btn" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Novo Lead</div>
    <div id="modal-form"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><div class="toast-dot" id="toast-dot"></div><span id="toast-msg"></span></div>

<script>
// ─── STORAGE ─────────────────────────────────────────────────────────────────
const KEYS = { leads:'crm_v2_leads', activities:'crm_v2_activities' };

async function save() {
  try {
    const ls = typeof window.storage !== 'undefined';
    if (ls) {
      await window.storage.set(KEYS.leads, JSON.stringify(leads), true);
      await window.storage.set(KEYS.activities, JSON.stringify(activities), true);
      setSyncTxt('Salvo · online');
    } else {
      localStorage.setItem(KEYS.leads, JSON.stringify(leads));
      localStorage.setItem(KEYS.activities, JSON.stringify(activities));
      setSyncTxt('Salvo · local');
    }
  } catch(e) { setSyncTxt('Erro ao salvar'); }
}

async function loadData() {
  try {
    const ls = typeof window.storage !== 'undefined';
    if (ls) {
      const [rl, ra] = await Promise.all([
        window.storage.get(KEYS.leads, true).catch(() => null),
        window.storage.get(KEYS.activities, true).catch(() => null),
      ]);
      leads = rl ? JSON.parse(rl.value) : [];
      activities = ra ? JSON.parse(ra.value) : [];
    } else {
      const sl = localStorage.getItem(KEYS.leads);
      const sa = localStorage.getItem(KEYS.activities);
      leads = sl ? JSON.parse(sl) : [];
      activities = sa ? JSON.parse(sa) : [];
    }
  } catch(e) { leads = []; activities = []; }
  renderAll();
}

function setSyncTxt(t) { document.getElementById('sync-txt').textContent = t; }

// ─── DATA ─────────────────────────────────────────────────────────────────────
let leads = [], activities = [];
let currentSection = 'dashboard', currentModal = 'lead';
let filterTemp = 'all', filterStage = '', filterOrigin = '', searchQ = '';

const STAGES = ['lead','qualificado','proposta','negociacao','fechado','perdido'];
const STAGE_LBL = {lead:'Lead',qualificado:'Qualificado',proposta:'Proposta',negociacao:'Negociação',fechado:'Fechado',perdido:'Perdido'};
const STAGE_PROB = {lead:10,qualificado:30,proposta:55,negociacao:75,fechado:100,perdido:0};
const TEMP_LBL = {quente:'🔥 Quente',morno:'🟡 Morno',frio:'❄️ Frio'};
const AV_COLORS = [['#00e5a020','#00e5a0'],['#3d8ef820','#6aaffe'],['#a855f720','#c084fc'],['#ff7b3520','#ff9a5c'],['#ff475720','#ff6b7a']];

function initials(n) { return n.trim().split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'; }
function avCol(n) { let s=0; for(let c of n) s+=c.charCodeAt(0); return AV_COLORS[s%AV_COLORS.length]; }
function fmtMoney(v) { return v >= 1000 ? 'R$'+(v/1000).toFixed(0)+'k' : 'R$'+v; }
function fmtMoneyFull(v) { return 'R$ '+Number(v).toLocaleString('pt-BR'); }
function nowStr() { return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function daysSince(ts) { return Math.floor((Date.now()-ts)/86400000); }

function nbaFor(lead) {
  const d = daysSince(lead.updatedAt || lead.createdAt);
  if (lead.stage === 'lead') return '📞 Ligar para qualificar';
  if (lead.stage === 'qualificado') return '📄 Enviar proposta';
  if (lead.stage === 'proposta' && d > 3) return '🔁 Follow-up da proposta';
  if (lead.stage === 'negociacao') return '🤝 Agendar reunião de fechamento';
  if (lead.temp === 'frio' && d > 7) return '♻️ Reativar com novo ângulo';
  if (d > 5) return '📲 Entrar em contato hoje';
  return '✅ Manter cadência';
}

function scoreOf(lead) {
  let s = 0;
  if (lead.temp === 'quente') s += 40;
  else if (lead.temp === 'morno') s += 20;
  const si = STAGES.indexOf(lead.stage);
  s += si * 10;
  if (lead.budget) s += 10;
  if (lead.urgency === 'alta') s += 20;
  else if (lead.urgency === 'media') s += 10;
  return Math.min(s, 100);
}

function scoreColor(s) {
  if (s >= 70) return '#00e5a0';
  if (s >= 40) return '#ffcc00';
  return '#ff4757';
}

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll() {
  updateStats();
  updateBadges();
  if (currentSection === 'dashboard') renderDashboard();
  else if (currentSection === 'leads') renderLeadsTable();
  else if (currentSection === 'pipeline') renderPipeline();
  else if (currentSection === 'atividades') renderActivities();
  else if (currentSection === 'alertas') renderAlerts();
  else if (currentSection === 'relatorios') renderReports();
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const active = leads.filter(l => l.stage !== 'perdido');
  const pipe = active.filter(l => l.stage !== 'fechado').reduce((s,l)=>s+(+l.value||0),0);
  const fechados = leads.filter(l => l.stage === 'fechado');
  const rec = fechados.reduce((s,l)=>s+(+l.value||0),0);
  const conv = leads.length ? Math.round(fechados.length/leads.length*100) : 0;
  const hot = leads.filter(l=>l.temp==='quente'&&l.stage!=='fechado'&&l.stage!=='perdido').length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card green"><div class="stat-label">Total de leads</div><div class="stat-val green">${leads.length}</div><div class="stat-sub">${hot} quentes</div></div>
    <div class="stat-card blue"><div class="stat-label">Pipeline ativo</div><div class="stat-val blue">${fmtMoney(pipe)}</div><div class="stat-sub">em negociação</div></div>
    <div class="stat-card orange"><div class="stat-label">Receita fechada</div><div class="stat-val orange">${fmtMoney(rec)}</div><div class="stat-sub">${fechados.length} negócios</div></div>
    <div class="stat-card purple"><div class="stat-label">Taxa de conversão</div><div class="stat-val purple">${conv}%</div><div class="stat-sub">geral</div></div>
    <div class="stat-card red"><div class="stat-label">Ticket médio</div><div class="stat-val" style="color:var(--yellow)">${fechados.length?fmtMoney(Math.round(rec/fechados.length)):'R$0'}</div><div class="stat-sub">por negócio</div></div>`;
}

function updateBadges() {
  document.getElementById('nav-leads-badge').textContent = leads.filter(l=>l.stage!=='fechado'&&l.stage!=='perdido').length;
  const alertCount = leads.filter(l=>{
    const d=daysSince(l.updatedAt||l.createdAt);
    return (l.temp==='quente'&&d>2)||(d>7&&l.stage!=='fechado'&&l.stage!=='perdido');
  }).length;
  document.getElementById('nav-alerts-badge').textContent = alertCount;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const hot = leads.filter(l=>l.temp==='quente'&&l.stage!=='fechado'&&l.stage!=='perdido').sort((a,b)=>scoreOf(b)-scoreOf(a)).slice(0,5);
  const hlEl = document.getElementById('dash-hot-leads');
  if (!hot.length) { hlEl.innerHTML='<div class="empty"><div class="empty-icon">🔥</div><div class="empty-sub">Nenhum lead quente ainda</div></div>'; }
  else hlEl.innerHTML = hot.map(l=>{
    const [bg,fg]=avCol(l.name); const sc=scoreOf(l);
    return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)" onclick="openDetail(${l.id})">
      <div class="avatar-sm" style="background:${bg};color:${fg}">${initials(l.name)}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${l.name}</div><div style="font-size:11px;color:var(--text3)">${l.company||''}${l.value?' · '+fmtMoney(+l.value):''}</div></div>
      <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:${scoreColor(sc)}">${sc}pts</div><div class="temp-badge temp-quente" style="font-size:10px;padding:2px 7px">🔥</div></div>
    </div>`}).join('');

  const nba = leads.filter(l=>l.stage!=='fechado'&&l.stage!=='perdido').sort((a,b)=>scoreOf(b)-scoreOf(a)).slice(0,5);
  const nbaEl = document.getElementById('dash-nba');
  if (!nba.length) { nbaEl.innerHTML='<div class="empty"><div class="empty-sub">Adicione leads para ver sugestões</div></div>'; }
  else nbaEl.innerHTML = nba.map(l=>`
    <div style="padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:12px;font-weight:500;margin-bottom:3px">${l.name}</div>
      <div class="nba-chip">${nbaFor(l)}</div>
    </div>`).join('');

  const recent = [...activities].slice(0,5);
  const actEl = document.getElementById('dash-activities');
  if (!recent.length) { actEl.innerHTML='<div class="empty"><div class="empty-sub">Nenhuma atividade ainda</div></div>'; }
  else actEl.innerHTML = recent.map(a=>actHTML(a)).join('');
}

// ─── LEADS TABLE ──────────────────────────────────────────────────────────────
function getFilteredLeads() {
  return leads.filter(l=>{
    if (filterTemp !== 'all' && l.temp !== filterTemp) return false;
    if (filterStage && l.stage !== filterStage) return false;
    if (filterOrigin && l.origin !== filterOrigin) return false;
    if (searchQ && !(l.name+l.company+l.email).toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
}

function renderLeadsTable() {
  const list = getFilteredLeads();
  const wrap = document.getElementById('leads-table-wrap');
  if (!list.length) { wrap.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">Nenhum lead encontrado</div><div class="empty-sub">Clique em "+ Novo Lead" para começar</div></div>'; return; }
  wrap.innerHTML = `<table class="leads-table">
    <thead><tr>
      <th>Nome</th><th>Temperatura</th><th>Estágio</th><th>Valor</th><th>Origem</th><th>Score</th><th>Próx. ação</th><th></th>
    </tr></thead>
    <tbody>${list.map(l=>{
      const [bg,fg]=avCol(l.name); const sc=scoreOf(l);
      return `<tr onclick="openDetail(${l.id})" style="cursor:pointer">
        <td><div class="lead-name-wrap"><div class="avatar-sm" style="background:${bg};color:${fg}">${initials(l.name)}</div>
          <div><div class="lead-name">${l.name}</div><div class="lead-company">${l.company||'—'}</div></div></div></td>
        <td><span class="temp-badge temp-${l.temp}">${TEMP_LBL[l.temp]||l.temp}</span></td>
        <td><span class="stage-badge stage-${l.stage}">${STAGE_LBL[l.stage]||l.stage}</span></td>
        <td style="font-weight:600;color:var(--accent)">${l.value?fmtMoneyFull(+l.value):'—'}</td>
        <td style="color:var(--text2);font-size:12px">${l.origin||'—'}</td>
        <td><div style="display:flex;align-items:center;gap:6px"><div class="score-bar"><div class="score-fill" style="width:${sc}%;background:${scoreColor(sc)}"></div></div><span style="font-size:11px;color:${scoreColor(sc)}">${sc}</span></div></td>
        <td><div class="nba-chip" style="font-size:10px">${nbaFor(l)}</div></td>
        <td onclick="event.stopPropagation()"><div class="action-btns">
          <button class="icon-btn" title="Editar" onclick="editLead(${l.id})">✏️</button>
          <button class="icon-btn" title="Excluir" onclick="deleteLead(${l.id})">🗑️</button>
        </div></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function filterLeads(t, btn) {
  filterTemp = t;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeadsTable();
}
function filterByStage(v) { filterStage = v; renderLeadsTable(); }
function filterByOrigin(v) { filterOrigin = v; renderLeadsTable(); }
function globalSearch(v) { searchQ = v; if(currentSection==='leads') renderLeadsTable(); }

// ─── PIPELINE ─────────────────────────────────────────────────────────────────
function renderPipeline() {
  const board = document.getElementById('pipeline-board');
  const pipeStages = ['lead','qualificado','proposta','negociacao','fechado'];
  const colors = {lead:'#3d8ef8',qualificado:'#a855f7',proposta:'#ff7b35',negociacao:'#ffcc00',fechado:'#00e5a0'};
  board.innerHTML = pipeStages.map(stage=>{
    const sd = leads.filter(l=>l.stage===stage);
    const total = sd.reduce((s,l)=>s+(+l.value||0),0);
    const col = colors[stage];
    return `<div class="pipe-col">
      <div class="pipe-col-header" style="background:${col}15;border:1px solid ${col}30">
        <div><div class="pipe-col-title" style="color:${col}">${STAGE_LBL[stage]}</div>
        <div class="pipe-col-total" style="color:${col}">${total?fmtMoneyFull(total):''}</div></div>
        <span class="pipe-col-count" style="background:${col}25;color:${col}">${sd.length}</span>
      </div>
      ${sd.length?sd.map(l=>{
        const prob = STAGE_PROB[stage];
        return `<div class="pipe-card" onclick="openDetail(${l.id})">
          <div class="pipe-card-title">${l.name}</div>
          <div class="pipe-card-company">${l.company||'Sem empresa'}</div>
          ${l.value?`<div class="pipe-card-value">${fmtMoneyFull(+l.value)}</div>`:''}
          <div class="pipe-card-meta">
            <span class="pipe-card-days">${daysSince(l.updatedAt||l.createdAt)}d no estágio</span>
            <span class="pipe-card-prob" style="background:${scoreColor(prob)}20;color:${scoreColor(prob)}">${prob}%</span>
          </div>
          <div class="nba-chip">${nbaFor(l)}</div>
        </div>`;
      }).join(''):`<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">vazio</div>`}
    </div>`;
  }).join('');
}

// ─── ACTIVITIES ───────────────────────────────────────────────────────────────
const ACT_ICONS = {call:'📞',email:'✉️',meet:'👥',note:'📝',whatsapp:'💬',proposta:'📄'};
const ACT_COLORS = {call:'#00e5a020',email:'#3d8ef820',meet:'#a855f720',note:'#ff7b3520',whatsapp:'#00e5a020',proposta:'#ff475720'};

function actHTML(a) {
  return `<div class="act-item">
    <div class="act-icon-wrap" style="background:${ACT_COLORS[a.type]||'#ffffff10'}">${ACT_ICONS[a.type]||'📌'}</div>
    <div class="act-body"><div class="act-title">${a.title}</div><div class="act-meta">${a.meta||''}</div></div>
    <div class="act-time">${a.time||''}</div>
  </div>`;
}

function renderActivities() {
  const el = document.getElementById('activities-full');
  if (!activities.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Nenhuma atividade</div><div class="empty-sub">Registre ligações, e-mails e reuniões</div></div>'; return; }
  el.innerHTML = activities.map(actHTML).join('');
}

// ─── ALERTS ───────────────────────────────────────────────────────────────────
function renderAlerts() {
  const el = document.getElementById('alerts-list');
  const alerts = [];
  leads.forEach(l => {
    const d = daysSince(l.updatedAt||l.createdAt);
    if (l.stage==='fechado'||l.stage==='perdido') return;
    if (l.temp==='quente' && d>=2) alerts.push({type:'hot',icon:'🔥',title:`Lead quente parado: ${l.name}`,sub:`${d} dias sem atualização · ${nbaFor(l)}`,lead:l});
    else if (d>=7) alerts.push({type:'warm',icon:'⚠️',title:`Follow-up urgente: ${l.name}`,sub:`${d} dias sem contato · Risco de perda`,lead:l});
    else if (l.stage==='proposta' && d>=4) alerts.push({type:'info',icon:'📄',title:`Proposta sem resposta: ${l.name}`,sub:`${d} dias aguardando retorno`,lead:l});
  });
  if (!alerts.length) { el.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">Tudo em dia!</div><div class="empty-sub">Nenhum alerta no momento</div></div>'; return; }
  el.innerHTML = alerts.map(a=>`
    <div class="alert-item alert-${a.type==='hot'?'hot':a.type==='warm'?'warm':'info'}">
      <div class="alert-icon">${a.icon}</div>
      <div class="alert-body"><div class="alert-title">${a.title}</div><div class="alert-sub">${a.sub}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="openDetail(${a.lead.id})">Ver lead</button>
    </div>`).join('');
}

// ─── REPORTS ──────────────────────────────────────────────────────────────────
let reportPeriod = 'diario';

function setReportPeriod(p, btn) {
  reportPeriod = p;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReports();
}

function getPeriodRange() {
  const now = new Date(); const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if (reportPeriod==='diario') {
    return { start: today.getTime(), label: 'Hoje · '+today.toLocaleDateString('pt-BR') };
  } else if (reportPeriod==='semanal') {
    const d = new Date(today); d.setDate(d.getDate()-6);
    return { start: d.getTime(), label: 'Últimos 7 dias · '+d.toLocaleDateString('pt-BR')+' até hoje' };
  } else if (reportPeriod==='mensal') {
    const d = new Date(today); d.setDate(d.getDate()-29);
    return { start: d.getTime(), label: 'Últimos 30 dias · '+d.toLocaleDateString('pt-BR')+' até hoje' };
  }
  return { start: 0, label: 'Todo o período' };
}

function filterByPeriod(list, tsField) {
  const { start } = getPeriodRange();
  if (start === 0) return list;
  return list.filter(x => (x[tsField]||x.createdAt||0) >= start);
}

function renderReports() {
  const { label } = getPeriodRange();
  document.getElementById('report-period-label').textContent = '📌 Período: '+label;

  const pLeads = filterByPeriod(leads, 'createdAt');
  const pActs  = filterByPeriod(activities, 'id');

  // Stats do período
  const pFechados = pLeads.filter(l=>l.stage==='fechado');
  const pRec = pFechados.reduce((s,l)=>s+(+l.value||0),0);
  const pPipe = pLeads.filter(l=>l.stage!=='fechado'&&l.stage!=='perdido').reduce((s,l)=>s+(+l.value||0),0);
  const pConv = pLeads.length ? (pFechados.length/pLeads.length*100).toFixed(1) : 0;
  document.getElementById('report-stats').innerHTML = `
    <div class="stat-card green"><div class="stat-label">Novos leads</div><div class="stat-val green">${pLeads.length}</div></div>
    <div class="stat-card orange"><div class="stat-label">Receita fechada</div><div class="stat-val orange">${fmtMoney(pRec)}</div></div>
    <div class="stat-card blue"><div class="stat-label">Pipeline gerado</div><div class="stat-val blue">${fmtMoney(pPipe)}</div></div>
    <div class="stat-card purple"><div class="stat-label">Conversão</div><div class="stat-val purple">${pConv}%</div></div>
    <div class="stat-card"><div class="stat-label">Atividades</div><div class="stat-val" style="color:var(--yellow)">${pActs.length}</div></div>`;

  // Funil
  const pipeStages = ['lead','qualificado','proposta','negociacao','fechado'];
  const colors2 = ['#3d8ef8','#a855f7','#ff7b35','#ffcc00','#00e5a0'];
  const maxCount = Math.max(1, ...pipeStages.map(s=>pLeads.filter(l=>l.stage===s).length));
  document.getElementById('funnel-chart').innerHTML = pipeStages.map((s,i)=>{
    const count = pLeads.filter(l=>l.stage===s).length;
    const pct = Math.round(count/maxCount*100);
    return `<div class="funnel-row">
      <div class="funnel-label">${STAGE_LBL[s]}</div>
      <div class="funnel-track"><div class="funnel-fill" style="width:${Math.max(pct,count>0?8:0)}%;background:${colors2[i]}">${count>0?count:''}</div></div>
      <div class="funnel-num">${count}</div>
    </div>`;
  }).join('');

  // Financeiro
  const perdidos = pLeads.filter(l=>l.stage==='perdido');
  const ticket = pFechados.length ? Math.round(pRec/pFechados.length) : 0;
  document.getElementById('financial-metrics').innerHTML = [

// ─── DOWNLOAD CSV ─────────────────────────────────────────────────────────────
function downloadCSV() {
  const { label } = getPeriodRange();
  const pLeads = filterByPeriod(leads, 'createdAt');
  const pActs  = filterByPeriod(activities, 'id');
  const periodNames = {diario:'Diario',semanal:'Semanal',mensal:'Mensal',geral:'Geral'};

  let csv = 'RELATÓRIO CRM · '+label+'\n\n';
  csv += 'LEADS\n';
  csv += 'Nome,Empresa,Email,Telefone,Temperatura,Estágio,Valor,Origem,Urgência,Score,Cadastrado\n';
  pLeads.forEach(l=>{
    csv += [l.name,l.company||'',l.email||'',l.phone||'',l.temp,STAGE_LBL[l.stage]||l.stage,l.value||0,l.origin||'',l.urgency||'',scoreOf(l),l.createdAt?new Date(l.createdAt).toLocaleDateString('pt-BR'):''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+'\n';
  });

  csv += '\nATIVIDADES\n';
  csv += 'Tipo,Título,Detalhe,Data\n';
  pActs.forEach(a=>{
    csv += [a.type||'',a.title,a.meta||'',a.time||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+'\n';
  });

  const pFechados = pLeads.filter(l=>l.stage==='fechado');
  const pRec = pFechados.reduce((s,l)=>s+(+l.value||0),0);
  const pPipe = pLeads.filter(l=>l.stage!=='fechado'&&l.stage!=='perdido').reduce((s,l)=>s+(+l.value||0),0);
  csv += '\nRESUMO FINANCEIRO\n';
  csv += 'Métrica,Valor\n';
  csv += '"Receita fechada","'+fmtMoneyFull(pRec)+'"\n';
  csv += '"Pipeline em aberto","'+fmtMoneyFull(pPipe)+'"\n';
  csv += '"Total de leads","'+pLeads.length+'"\n';
  csv += '"Total de atividades","'+pActs.length+'"\n';

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='CRM_Relatorio_'+periodNames[reportPeriod]+'_'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV baixado ✓');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
let editingId = null;
function openModal(type, prefillLeadId) {
  currentModal = type;
  editingId = null;
  if (type === 'lead') {
    document.getElementById('modal-title').innerHTML = '👤 Novo Lead';
    document.getElementById('modal-form').innerHTML = leadForm({});
  } else {
    document.getElementById('modal-title').innerHTML = '📋 Nova Atividade';
    document.getElementById('modal-form').innerHTML = activityForm(prefillLeadId);
  }
  document.getElementById('modal').classList.add('open');
}
function openActivityForLead(lid) { openModal('activity', lid); }
function editLead(id) {
  const l = leads.find(x=>x.id===id);
  if (!l) return;
  editingId = id; currentModal = 'lead';
  document.getElementById('modal-title').innerHTML = '✏️ Editar Lead';
  document.getElementById('modal-form').innerHTML = leadForm(l);
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editingId=null; }

function leadForm(l) {

    <div class="form-group"><label class="form-label">Temperatura</label>${sel('f-temp',[['quente','🔥 Quente'],['morno','🟡 Morno'],['frio','❄️ Frio']],l.temp||'morno')}</div>

  </div>
  <div class="form-row">

function activityForm(prefillLeadId) {
  const leadsOpts = leads.map(l=>`<option value="${l.id}"${l.id===prefillLeadId?' selected':''}>${l.name}${l.company?' · '+l.company:''}</option>`).join('');
  return `<div class="form-group"><label class="form-label">Lead relacionado</label>

  <div class="form-group"><label class="form-label">Título / descrição *</label><input class="form-input" id="f-atitle" placeholder="Ex: Ligação de qualificação com João"></div>

function saveModal() {
  if (currentModal === 'lead') {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { showToast('Informe o nome do lead','#ff4757'); return; }
    const data = {
      name, company:document.getElementById('f-company').value.trim(),
      email:document.getElementById('f-email').value.trim(), phone:document.getElementById('f-phone').value.trim(),
      temp:document.getElementById('f-temp').value, stage:document.getElementById('f-stage').value,
      value:document.getElementById('f-value').value, origin:document.getElementById('f-origin').value,
      urgency:document.getElementById('f-urgency').value, budget:document.getElementById('f-budget').value,
      pain:document.getElementById('f-pain').value.trim(), desire:document.getElementById('f-desire').value.trim(),
      notes:document.getElementById('f-notes').value.trim(),
    };
    if (editingId) {
      const idx = leads.findIndex(x=>x.id===editingId);
      leads[idx] = {...leads[idx],...data,updatedAt:Date.now()};
      showToast('Lead atualizado ✓');
    } else {
      leads.push({...data, id:Date.now(), createdAt:Date.now(), updatedAt:Date.now()});
      showToast('Lead adicionado ✓');
    }
  } else {
    const title = document.getElementById('f-atitle').value.trim();
    if (!title) { showToast('Informe o título','#ff4757'); return; }
    const lid = document.getElementById('f-lead-id').value;
    const lead = lid ? leads.find(l=>l.id===+lid) : null;
    activities.unshift({
      id:Date.now(), leadId:lid?+lid:null,
      type:document.getElementById('f-atype').value,
      title, meta:(lead?lead.name+' · ':'')+document.getElementById('f-ameta').value.trim(),
      time:nowStr()
    });
    if (lead) { lead.updatedAt = Date.now(); }
    showToast('Atividade registrada ✓');
  }
  closeModal(); save(); renderAll();
}

function deleteLead(id) {
  if (!confirm('Excluir este lead?')) return;
  leads = leads.filter(l=>l.id!==id);
  save(); renderAll(); showToast('Lead excluído');
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function goTo(name, btn) {
  currentSection = name;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  const titles = {dashboard:'Dashboard',leads:'Leads',pipeline:'Pipeline',atividades:'Atividades',alertas:'Alertas & IA',relatorios:'Relatórios'};
  document.getElementById('page-title').textContent = titles[name]||name;
  renderAll();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, color) {
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-dot').style.background=color||'var(--accent)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
